<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>NAH44 — Insurance, Loans & Compliance</title>
    <meta name="description" content="NAH44 provides trusted insurance portfolios, home & business loans, and corporate compliance support across Hyderabad." />
    <!-- Google Fonts Inter -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="icon" type="image/png" href="/image.png" />
    <style>
      /* Keyboard skip link — hidden until focused */
      .skip-link {
        position: absolute;
        top: -100%;
        left: 50%;
        transform: translateX(-50%);
        background: var(--primary-color);
        color: #fff;
        padding: 0.75rem 1.5rem;
        border-radius: 0 0 12px 12px;
        font-weight: 600;
        z-index: 9999;
        transition: top 0.2s ease;
      }
      .skip-link:focus {
        top: 0;
        outline: 3px solid #fff;
        outline-offset: 2px;
      }
      /* Respect reduced motion preference */
      @media (prefers-reduced-motion: reduce) {
        *, ::*::before, ::*::after {
          animation-duration: 0.01ms !important;
          animation-iteration-count: 1 !important;
          scroll-behavior: auto !important;
          transition-duration: 0.01ms !important;
        }
      }
    </style>
  </head>
  <body>
    <a href="#main" className="skip-link">Skip to main content</a>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
